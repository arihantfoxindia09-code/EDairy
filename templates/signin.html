<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - My Digital Diary</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            box-sizing: border-box;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Georgia', serif;
            min-height: 100%;
            margin: 0;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        html {
            height: 100%;
        }

        .signin-container {
            max-width: 420px;
            width: 100%;
            background: #fefefe;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            overflow: hidden;
            position: relative;
        }

        .signin-header {
            background: linear-gradient(45deg, #2c3e50, #34495e);
            color: white;
            padding: 40px 30px 30px;
            text-align: center;
            position: relative;
        }

        .diary-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            color: #3498db;
        }

        .signin-title {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .signin-subtitle {
            font-size: 1rem;
            opacity: 0.9;
            margin: 0;
        }

        .signin-form {
            padding: 40px 30px;
        }

        .form-group {
            margin-bottom: 25px;
            position: relative;
        }

        .form-label {
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        .form-control {
            border: 2px solid #ecf0f1;
            border-radius: 10px;
            padding: 12px 15px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #fafafa;
        }

        .form-control:focus {
            border-color: #3498db;
            box-shadow: 0 0 0 0.2rem rgba(52, 152, 219, 0.25);
            background: white;
        }

        .input-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #95a5a6;
            font-size: 1.1rem;
        }

        .password-toggle {
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .password-toggle:hover {
            color: #3498db;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 0.9rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            color: #7f8c8d;
        }

        .remember-me input {
            margin-right: 8px;
            accent-color: #3498db;
        }

        .forgot-password {
            color: #3498db;
            text-decoration: none;
            font-weight: 500;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        .signin-btn {
            background: linear-gradient(45deg, #3498db, #2980b9);
            border: none;
            border-radius: 10px;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: 600;
            color: white;
            width: 100%;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .signin-btn:hover {
            background: linear-gradient(45deg, #2980b9, #1f5f8b);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4);
        }

        .signin-btn:active {
            transform: translateY(0);
        }

        .divider {
            text-align: center;
            margin: 25px 0;
            position: relative;
            color: #7f8c8d;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #ecf0f1;
        }

        .divider span {
            background: white;
            padding: 0 15px;
            font-size: 0.9rem;
        }

        .social-login {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        .social-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #ecf0f1;
            border-radius: 10px;
            background: white;
            color: #7f8c8d;
            text-decoration: none;
            text-align: center;
            transition: all 0.3s ease;
            font-size: 1.2rem;
        }

        .social-btn:hover {
            border-color: #3498db;
            color: #3498db;
            transform: translateY(-2px);
        }

        .google-btn:hover {
            border-color: #db4437;
            color: #db4437;
        }

        .facebook-btn:hover {
            border-color: #4267B2;
            color: #4267B2;
        }

        .signup-link {
            text-align: center;
            color: #7f8c8d;
            font-size: 0.95rem;
        }

        .signup-link a {
            color: #3498db;
            text-decoration: none;
            font-weight: 600;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }

        .success-message {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .error-message {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .welcome-back {
            background: #e3f2fd;
            border: 1px solid #bbdefb;
            color: #1565c0;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        @media (max-width: 576px) {
            .signin-container {
                margin: 10px;
                border-radius: 15px;
            }

            .signin-header {
                padding: 30px 20px 25px;
            }

            .signin-form {
                padding: 30px 20px;
            }
        }
         .logoImg{
            width:22%;
            height:auto;
            mix-blend-mode: multiply;
        }
    </style>
</head>
<body>
    <div class="signin-container">
        <div class="signin-header">
            <div class="diary-icon">
<!--                <i class="fas fa-book-open"></i>-->
                <img class="logoImg" src="static/images/images_mood.jpg">
            </div>
            <h1 class="signin-title">Welcome Back</h1>
            <p class="signin-subtitle">Continue your journaling journey</p>
        </div>

        <div class="signin-form">
            <div class="welcome-back" id="welcomeMessage">
                <i class="fas fa-heart"></i> Welcome back! We missed you.
            </div>

            <div class="success-message" id="successMessage">
                <i class="fas fa-check-circle"></i> Sign in successful! Redirecting to your diary...
            </div>

            <div class="error-message" id="errorMessage">
                <i class="fas fa-exclamation-triangle"></i> Invalid email or password. Please try again.
            </div>

            <form id="signinForm">
                <div class="form-group">
                    <label class="form-label" for="email">
                        <i class="fas fa-envelope me-2"></i>Email Address
                    </label>
                    <input type="email" class="form-control" id="email" placeholder="Enter your email" pattern="^[a-zA-Z]+(?:[\s'-][a-zA-Z]+)*$" title="PLease enter valid name" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">
                        <i class="fas fa-lock me-2"></i>Password
                    </label>
                    <div style="position: relative;">
                        <input type="password" class="form-control" id="password" placeholder="Enter your password"  pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}" title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 or more characters" required>
                        <i class="fas fa-eye input-icon password-toggle" id="togglePassword"></i>
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe">
                        Remember me
                    </label>
                    <a href="#" class="forgot-password" onclick="showForgotPassword()">
                        Forgot password?
                    </a>
                </div>

                <button type="submit" class="signin-btn">
                    <i class="fas fa-sign-in-alt me-2"></i>Sign In to My Diary
                </button>
            </form>

            <div class="signup-link">
                Don't have an account? <a href="#" onclick="showSignupForm()">Create one here</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Check if user is returning
        window.addEventListener('load', function() {
            const savedUser = localStorage.getItem('diaryUser');
            if (savedUser) {
                const welcomeMessage = document.getElementById('welcomeMessage');
                welcomeMessage.style.display = 'block';

                // Pre-fill email if remembered
                const userData = JSON.parse(savedUser);
                if (userData.email) {
                    document.getElementById('email').value = userData.email;
                    document.getElementById('rememberMe').checked = true;
                }
            }
        });

        // Password visibility toggle
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('togglePassword');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        });

        // Form validation and submission
        document.getElementById('signinForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            const successMessage = document.getElementById('successMessage');
            const errorMessage = document.getElementById('errorMessage');
            const welcomeMessage = document.getElementById('welcomeMessage');

            // Hide previous messages
            successMessage.style.display = 'none';
            errorMessage.style.display = 'none';
            welcomeMessage.style.display = 'none';

            // Basic validation
            if (!email || !password) {
                errorMessage.textContent = 'Please enter both email and password.';
                errorMessage.style.display = 'block';
                return;
            }

            // Email validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                errorMessage.textContent = 'Please enter a valid email address.';
                errorMessage.style.display = 'block';
                return;
            }

            // Sending the data using AJAX (fetch API)
            const formData = {
                email: email,
                password: password,
            };

            fetch('/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(formData)
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    successMessage.textContent = data.success;
                    successMessage.style.display = 'block';
                    //window.location.href = '/mainpage?userid='+data.userid;
                    window.location.href = '/page?userid='+data.userid;
                } else {
                    errorMessage.textContent = data.error;
                    errorMessage.style.display = 'block';
                }
            })
            .catch(error => {
                errorMessage.textContent = 'An error occurred, please try again later.';
                errorMessage.style.display = 'block';
            });

            // Show error for invalid credentials
            errorMessage.textContent = 'Invalid email or password. Try demo@diary.com / demo123 for testing.';
            errorMessage.style.display = 'block';
        });

        // Social login handlers
        function handleSocialLogin(provider) {
            alert(`Social login with ${provider} would be implemented here. This is a demo version.`);
        }

        function showSignupForm() {
            alert('Sign-up form would be shown here. This is a demo version.');
        }

        function showForgotPassword() {
            const email = prompt('Enter your email address to reset your password:');
            if (email) {
                alert(`Password reset link would be sent to ${email}. This is a demo version.`);
            }
        }

        // Add interactive feedback
        const inputs = document.querySelectorAll('.form-control');
        inputs.forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.style.transform = 'scale(1.02)';
                this.parentElement.style.transition = 'transform 0.2s ease';
            });

            input.addEventListener('blur', function() {
                this.parentElement.style.transform = 'scale(1)';
            });
        });

        // Auto-focus email field
        document.getElementById('email').focus();
    </script>
